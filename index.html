<!doctype html>

    <link

      rel="stylesheet"

    <style>
      body {
        background-color: #f8f9fa; /* Un gris muy claro para resaltar el contenido */
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .iframe-container {
        position: relative;
        width: 100%;
        max-width: 1000px; /* Ancho máximo para que no se vea gigante en monitores grandes */
        margin: 0 auto;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15); /* Sombra para dar profundidad */
        border-radius: 8px;
        overflow: hidden;
      }
      /* Hacemos el iframe responsivo */
      .ratio-16x9 {
        --bs-aspect-ratio: 56.25%;
      }
      footer {
        margin-top: auto;
        background-color: #ffffff;
        border-top: 1px solid #dee2e6;
      }
    </style>
  </head>

  <body>
    <header class="py-4 bg-white shadow-sm mb-4">

    </header>

    <main class="container mb-5">
      <div class="row justify-content-center">
        <div class="col-lg-10">
          <div class="iframe-container ratio ratio-16x9">
            <iframe
              style="border: 1px solid rgba(0, 0, 0, 0.1)"

              src="https://embed.figma.com/proto/MShBc36xWVBAulXo0leLmt/Proyecto_ingenieria_2?node-id=3-2&p=f&viewport=8%2C1541%2C0.27&scaling=min-zoom&content-scaling=fixed&page-id=0%3A1&embed-host=share"
              allowfullscreen
            ></iframe>
          </div>
          <div class="text-center mt-3">
            <small class="text-muted italic"
              >Interactúa con el prototipo navegando por los elementos del
              diseño.</small
            >
          </div>
        </div>
      </div>
    </main>

    <footer class="py-4">
      <div class="container">
        <div class="row align-items-center">
          <div class="col-md-6 text-center text-md-start">
            <h5 class="mb-1">Integrantes del Equipo:</h5>
            <ul class="list-unstyled mb-0">
              <li><strong>•</strong> Julián David Lara González</li>
              <li><strong>•</strong> Diego Alejandro Carreño García</li>
              <li><strong>•</strong>Jorge Arturo Monroy Rojas</li>
              <li><strong>•</strong>Jorge Casas</li>
            </ul>
          </div>
          <div class="col-md-6 text-center text-md-end mt-3 mt-md-0">
            <p class="mb-0 text-muted">UNAD - Ingeniería de Sistemas</p>
            <p class="small text-muted">2026</p>
          </div>

      </div>
